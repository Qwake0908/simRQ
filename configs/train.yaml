# @package _global_

## 主训练配置

# 在此指定默认配置
# defaults 的顺序决定了配置覆盖的优先级
defaults:
  - _self_
  - data_loading: null
  - model: null
  - callbacks: default
  - logger: csv # 在此设置日志记录器，或通过命令行指定（例如 `python train.py logger=tensorboard`）
  - trainer: default
  - paths: default
  - extras: default
  - hydra: default
  - loss: null
  - optim: null
  - eval: null

  # 实验配置允许对特定超参数进行版本控制
  # 例如给定模型和数据模块的最佳超参数
  - experiment: null

# 任务名称，决定输出目录路径
task_name: "train"

id: ${now:%Y-%m-%d}/${now:%H-%M-%S}
# 用于标识实验的标签
# 可以在实验配置中覆盖
# 通过命令行覆盖：`python train.py tags="[first_tag, second_tag]"`
tags: ["dev"]

# 设为 False 以跳过模型训练
train: True

# 在测试集上评估，使用训练过程中获得的最佳模型权重
# Lightning 根据检查点回调中指定的指标选择最佳权重
test: True

# 提供检查点路径以恢复训练
ckpt_path: null

# PyTorch、NumPy 和 Python.random 中随机数生成器的种子
seed: null
